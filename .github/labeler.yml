# Label configuration for PR Labeler
# https://github.com/actions/labeler

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - 'Documentation/**'
          - '*.md'

tests:
  - changed-files:
      - any-glob-to-any-file:
          - 'Tests/**'
          - 'Build/phpunit/**'

ci:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**'
          - '.github/dependabot.yml'

configuration:
  - changed-files:
      - any-glob-to-any-file:
          - 'Configuration/**'
          - 'ext_*.php'
          - 'composer.json'
